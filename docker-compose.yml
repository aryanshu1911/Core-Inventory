version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ci_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-coreinventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-coreinventory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coreinventory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ci_network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ci_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ci_network

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ci_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:                   postgresql+asyncpg://${POSTGRES_USER:-coreinventory}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-coreinventory}
      JWT_SECRET_KEY:                 ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM:                  HS256
      ACCESS_TOKEN_EXPIRE_MINUTES:    ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REDIS_URL:                      redis://redis:6379
      SMTP_HOST:                      ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:                      ${SMTP_PORT:-587}
      SMTP_USER:                      ${SMTP_USER:-}
      SMTP_PASSWORD:                  ${SMTP_PASSWORD:-}
      RATE_LIMIT:                     ${RATE_LIMIT:-100/minute}
    ports:
      - "8000:8000"
    networks:
      - ci_network

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ci_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - ci_network

  # ── pgAdmin (optional dev tool) ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ci_pgadmin
    restart: unless-stopped
    profiles:
      - dev
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@coreinventory.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ci_network

# ── Volumes & Networks ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: ci_postgres_data

networks:
  ci_network:
    name: ci_network
    driver: bridge
